<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Súper RPG de Lectura - Edición Definitiva</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --app-height: 100%; }
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #0f172a;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        #root { height: 100%; width: 100%; }
        
        .title-font { font-family: 'Fredoka One', cursive; }

        /* Mapa con gradiente masivo mejorado */
        .map-bg-massive {
            background: linear-gradient(to bottom, 
                #1e1b4b 0%, #4c1d95 15%, #0284c7 30%, #0891b2 45%, 
                #047857 60%, #16a34a 75%, #f59e0b 90%, #9a3412 100%
            );
            background-size: 100% 5000px;
        }

        /* Animaciones del original */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.3s; }

        @keyframes damageText { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
        .floating-damage {
            position: absolute;
            font-weight: 900;
            font-size: 2.5rem;
            color: #ef4444;
            text-shadow: 2px 2px 0 #000;
            animation: damageText 0.8s forwards;
            pointer-events: none;
            z-index: 100;
        }

        /* Scroll suave para móviles */
        .custom-scroll {
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .custom-scroll::-webkit-scrollbar { display: none; }

        /* Efecto de brillo para items desbloqueados */
        .level-glow {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- SISTEMA DE VOZ ---
        const speak = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'es-ES';
                msg.rate = 0.95;
                msg.pitch = 1.1;
                window.speechSynthesis.speak(msg);
            }
        };

        // --- CONSTANTES ---
        const DICTIONARY = [
            {w: "SOL", m: "☀️"}, {w: "PAN", m: "🍞"}, {w: "REY", m: "👑"}, {w: "PEZ", m: "🐟"},
            {w: "MAR", m: "🌊"}, {w: "GATO", m: "🐱"}, {w: "PATO", m: "🦆"}, {w: "OSO", m: "🐻"},
            {w: "VACA", m: "🐮"}, {w: "LUNA", m: "🌙"}, {w: "CASA", m: "🏠"}, {w: "PERRO", m: "🐶"},
            {w: "MESA", m: "🪑"}, {w: "BOCA", m: "👄"}, {w: "MANO", m: "✋"}, {w: "PIE", m: "🦶"}
        ];

        const THEMES = [
            { name: "Pradera", bg: "bg-green-500", accent: "border-green-700", enemies: ["🐛", "🐌", "🐝"], boss: "👑", msgs: ["¡Te voy a picar!", "¡Soy muy lento!", "¡Cuidado con mi corona!"] },
            { name: "Bosque", bg: "bg-emerald-800", accent: "border-emerald-950", enemies: ["🕷️", "🦇", "🍄"], boss: "🐺", msgs: ["¡Auuu!", "¡No pises el hongo!", "¡Tengo mucha hambre!"] },
            { name: "Playa", bg: "bg-yellow-400", accent: "border-yellow-600", enemies: ["🦀", "🐡", "🦑"], boss: "🐙", msgs: ["¡Pinza va!", "¡Glup glup!", "¡Muchos tentáculos!"] },
            { name: "Nieve", bg: "bg-blue-200", accent: "border-blue-400", enemies: ["⛄", "🐧", "🧊"], boss: "🐻‍❄️", msgs: ["¡Qué frío!", "¡Deslízate!", "¡Rugido helado!"] },
            { name: "Castillo", bg: "bg-purple-700", accent: "border-purple-900", enemies: ["🛡️", "🤺", "👻"], boss: "🧙‍♂️", msgs: ["¡Mala suerte!", "¡Fuera de mi torre!", "¡Magia poderosa!"] }
        ];

        const SHOP_ITEMS = [
            { id: 'w1', type: 'weapon', name: "Espada Madera", emoji: "🪵", stat: 10, cost: 10 },
            { id: 'w2', type: 'weapon', name: "Espada Hierro", emoji: "🗡️", stat: 25, cost: 30 },
            { id: 'w3', type: 'weapon', name: "Espada Mágica", emoji: "✨", stat: 50, cost: 60 },
            { id: 'a1', type: 'armor', name: "Escudo Madera", emoji: "🛡️", stat: 10, cost: 15 },
            { id: 'a2', type: 'armor', name: "Capa Veloz", emoji: "🧣", stat: 20, cost: 40 },
            { id: 'c1', type: 'companion', name: "Perrito", emoji: "🐕", stat: 15, cost: 25 },
            { id: 'c2', type: 'companion', name: "Dragón", emoji: "🐉", stat: 40, cost: 80 }
        ];

        const LEVELS = Array.from({ length: 50 }, (_, i) => {
            const levelNum = i + 1;
            const themeIndex = Math.floor(i / 10) % THEMES.length;
            const theme = THEMES[themeIndex];
            return {
                id: levelNum,
                name: `${theme.name} ${levelNum}`,
                theme: theme,
                waves: Math.floor(i / 10) + 2,
                enemyHp: 30 + (i * 12),
                enemyAtk: 8 + (i * 3)
            };
        });

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [screen, setScreen] = useState('TITLE');
            const [stars, setStars] = useState(0);
            const [maxLevel, setMaxLevel] = useState(1);
            const [currentLevelId, setCurrentLevelId] = useState(null);
            const [player, setPlayer] = useState({
                avatar: '👦',
                inv: { weapon: null, armor: null, companion: null },
                purchased: []
            });

            useEffect(() => {
                const setHeight = () => document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
                window.addEventListener('resize', setHeight);
                setHeight();
                return () => window.removeEventListener('resize', setHeight);
            }, []);

            const stats = useMemo(() => {
                let atk = 20;
                let def = 0;
                if (player.inv.weapon) atk += SHOP_ITEMS.find(i => i.id === player.inv.weapon).stat;
                if (player.inv.armor) def += SHOP_ITEMS.find(i => i.id === player.inv.armor).stat;
                if (player.inv.companion) atk += SHOP_ITEMS.find(i => i.id === player.inv.companion).stat;
                return { atk, def };
            }, [player.inv]);

            return (
                <div className="w-full h-full flex flex-col relative bg-slate-950" style={{ height: 'var(--app-height)' }}>
                    
                    {/* UI FIJA SUPERIOR (Mapa y Tienda) */}
                    {(screen === 'MAP' || screen === 'SHOP') && (
                        <div className="fixed top-0 left-0 w-full z-50 p-4 flex justify-between items-center pointer-events-none">
                            <div className="bg-yellow-400 text-black px-5 py-2 rounded-2xl border-4 border-yellow-600 shadow-[0_4px_0_rgba(0,0,0,0.3)] pointer-events-auto flex items-center gap-2 transform active:scale-95 transition-transform">
                                <span className="text-2xl">⭐</span>
                                <span className="title-font text-2xl">{stars}</span>
                            </div>
                            
                            {screen === 'MAP' ? (
                                <button 
                                    onClick={() => { speak("¡Bienvenido a la tienda!"); setScreen('SHOP'); }}
                                    className="bg-purple-600 text-white p-3 rounded-2xl border-b-4 border-purple-800 shadow-lg pointer-events-auto flex items-center gap-2 active:translate-y-1 active:border-b-0"
                                >
                                    <span className="text-3xl">🛒</span>
                                    <span className="title-font hidden sm:inline text-lg">TIENDA</span>
                                </button>
                            ) : (
                                <button 
                                    onClick={() => setScreen('MAP')}
                                    className="bg-red-500 text-white px-6 py-2 rounded-2xl border-b-4 border-red-800 shadow-lg pointer-events-auto title-font text-xl active:translate-y-1 active:border-b-0"
                                >
                                    VOLVER
                                </button>
                            )}
                        </div>
                    )}

                    {screen === 'TITLE' && <TitleScreen onStart={() => setScreen('MAP')} setPlayer={setPlayer} player={player} />}
                    {screen === 'MAP' && <MapScreen maxLevel={maxLevel} onSelect={(id) => { setCurrentLevelId(id); setScreen('COMBAT'); }} />}
                    {screen === 'SHOP' && <ShopScreen stars={stars} setStars={setStars} player={player} setPlayer={setPlayer} />}
                    {screen === 'COMBAT' && (
                        <CombatScreen 
                            level={LEVELS[currentLevelId - 1]} 
                            player={player} 
                            stats={stats}
                            onWin={() => {
                                if (currentLevelId === maxLevel) setMaxLevel(prev => Math.min(50, prev + 1));
                                setStars(s => s + 20);
                                setScreen('MAP');
                            }}
                            onLose={() => setScreen('MAP')}
                        />
                    )}
                </div>
            );
        }

        // --- PANTALLAS ---

        function TitleScreen({ onStart, setPlayer, player }) {
            const avatars = ['👦', '👧', '🦸‍♂️', '🦸‍♀️'];
            return (
                <div className="flex-1 flex flex-col items-center justify-center bg-gradient-to-b from-blue-500 to-indigo-700 p-8 text-center">
                    <div className="animate-float mb-8">
                        <h1 className="title-font text-6xl text-yellow-300 drop-shadow-[0_5px_0_rgba(0,0,0,0.5)] leading-tight uppercase">Aventura<br/>Lectora</h1>
                    </div>
                    <div className="bg-white/10 backdrop-blur-md p-8 rounded-[40px] border-4 border-white/20 mb-12 w-full max-w-sm">
                        <p className="mb-6 font-black text-xl text-white uppercase tracking-widest">Elige tu Héroe</p>
                        <div className="flex justify-around">
                            {avatars.map(a => (
                                <button 
                                    key={a}
                                    onClick={() => { speak("¡Genial!"); setPlayer({...player, avatar: a}); }}
                                    className={`text-6xl p-3 rounded-3xl transition-all duration-300 ${player.avatar === a ? 'bg-yellow-400 scale-125 rotate-3 shadow-2xl' : 'opacity-40 grayscale'}`}
                                >{a}</button>
                            ))}
                        </div>
                    </div>
                    <button onClick={() => { speak("¡Comencemos la aventura!"); onStart(); }} className="bg-green-500 text-white title-font text-4xl px-16 py-6 rounded-full border-b-[12px] border-green-700 active:border-b-0 active:translate-y-3 transition-all shadow-2xl">¡JUGAR!</button>
                </div>
            );
        }

        function MapScreen({ maxLevel, onSelect }) {
            useEffect(() => {
                const timer = setTimeout(() => {
                    const currentBtn = document.getElementById(`lvl-${maxLevel}`);
                    if (currentBtn) currentBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 400);
                return () => clearTimeout(timer);
            }, [maxLevel]);

            return (
                <div className="flex-1 w-full h-full custom-scroll map-bg-massive relative pt-28 pb-40">
                    <div className="flex flex-col-reverse items-center gap-14">
                        {LEVELS.map((lvl, idx) => {
                            const isUnlocked = lvl.id <= maxLevel;
                            const isNext = lvl.id === maxLevel;
                            
                            return (
                                <div key={lvl.id} id={`lvl-${lvl.id}`} className="relative">
                                    {idx < LEVELS.length - 1 && (
                                        <div className={`absolute left-1/2 -translate-x-1/2 -top-14 w-3 h-14 -z-10 ${isUnlocked ? 'bg-white/40' : 'bg-black/20'}`}></div>
                                    )}
                                    
                                    <button 
                                        onClick={() => { if(isUnlocked) { speak("Nivel " + lvl.id); onSelect(lvl.id); } }}
                                        className={`w-28 h-28 rounded-full border-[6px] flex flex-col items-center justify-center title-font text-3xl transition-all relative
                                            ${isUnlocked ? 'bg-red-500 border-white text-white shadow-[0_8px_0_#991b1b] active:translate-y-1 active:shadow-none level-glow' : 'bg-slate-800 border-slate-700 text-slate-500'}
                                            ${isNext ? 'animate-bounce ring-8 ring-yellow-400/50' : ''}
                                        `}
                                    >
                                        {isUnlocked ? lvl.id : '🔒'}
                                        <div className="absolute -bottom-8 bg-black/60 px-3 py-1 rounded-full text-[12px] text-white border border-white/20 backdrop-blur-sm whitespace-nowrap">
                                            {lvl.theme.name}
                                        </div>
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function ShopScreen({ stars, setStars, player, setPlayer }) {
            const handleBuy = (item) => {
                if (player.purchased.includes(item.id)) {
                    speak("¡Equipado!");
                    setPlayer(p => ({ ...p, inv: { ...p.inv, [item.type]: item.id } }));
                } else if (stars >= item.cost) {
                    speak("¡Gracias por tu compra!");
                    setStars(s => s - item.cost);
                    setPlayer(p => ({
                        ...p,
                        purchased: [...p.purchased, item.id],
                        inv: { ...p.inv, [item.type]: item.id }
                    }));
                } else {
                    speak("¡Necesitas más estrellas!");
                }
            };

            return (
                <div className="flex-1 bg-indigo-950 pt-28 p-6 overflow-y-auto custom-scroll">
                    <h2 className="title-font text-4xl text-center text-yellow-400 mb-8 drop-shadow-lg">Gran Bazar</h2>
                    <div className="grid grid-cols-2 gap-5 pb-20">
                        {SHOP_ITEMS.map(item => {
                            const isOwned = player.purchased.includes(item.id);
                            const isEquipped = player.inv[item.type] === item.id;
                            return (
                                <div key={item.id} className="bg-white/5 backdrop-blur-sm p-5 rounded-[30px] border-2 border-white/10 flex flex-col items-center text-center shadow-xl">
                                    <span className="text-6xl mb-3 drop-shadow-md">{item.emoji}</span>
                                    <p className="font-black text-white text-md mb-1 uppercase">{item.name}</p>
                                    <p className="text-sm text-cyan-400 mb-4 font-bold">+{item.stat} Poder</p>
                                    <button 
                                        onClick={() => handleBuy(item)}
                                        className={`w-full py-3 rounded-2xl title-font text-md shadow-lg transition-all active:scale-95 ${isEquipped ? 'bg-green-500 text-white' : isOwned ? 'bg-blue-600 text-white' : 'bg-yellow-400 text-black'}`}
                                    >
                                        {isEquipped ? 'LISTO' : isOwned ? 'USAR' : `⭐ ${item.cost}`}
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function CombatScreen({ level, player, stats, onWin, onLose }) {
            const [wave, setWave] = useState(1);
            const [php, setPhp] = useState(100);
            const [ehp, setEhp] = useState(level.enemyHp);
            const [challenge, setChallenge] = useState(null);
            const [msg, setMsg] = useState("¡Prepárate!");
            const [floating, setFloating] = useState(null);
            const [turn, setTurn] = useState('PLAYER'); // PLAYER, ENEMY, ANIMATION
            const [shaking, setShaking] = useState(false);

            const enemyEmoji = wave === level.waves ? level.theme.boss : level.theme.enemies[Math.floor(Math.random() * level.theme.enemies.length)];

            const generateChallenge = () => {
                const target = DICTIONARY[Math.floor(Math.random() * DICTIONARY.length)];
                const others = DICTIONARY.filter(d => d.w !== target.w).sort(() => 0.5 - Math.random()).slice(0, 2);
                const options = [target.m, others[0].m, others[1].m].sort(() => 0.5 - Math.random());
                setChallenge({ word: target.w, correct: target.m, options });
                setMsg(`¡Busca el dibujo de: ${target.w}!`);
                speak(`Busca el dibujo de: ${target.w}`);
            };

            useEffect(() => {
                if(turn === 'PLAYER' && !challenge) generateChallenge();
            }, [wave, turn]);

            const handleAttack = (choice) => {
                if (turn !== 'PLAYER') return;

                if (choice === challenge.correct) {
                    const dmg = stats.atk + Math.floor(Math.random() * 5);
                    setFloating({ type: 'enemy', val: dmg });
                    setEhp(prev => {
                        const next = Math.max(0, prev - dmg);
                        if (next === 0) {
                            setTurn('ANIMATION');
                            if (wave < level.waves) {
                                setMsg("¡Enemigo derrotado!");
                                setTimeout(() => {
                                    setWave(w => w + 1);
                                    setEhp(level.enemyHp);
                                    setTurn('PLAYER');
                                    setChallenge(null);
                                }, 1500);
                            } else {
                                setMsg("¡VICTORIA TOTAL!");
                                speak("¡Eres un campeón!");
                                setTimeout(onWin, 2000);
                            }
                        } else {
                            setTurn('ENEMY');
                            setTimeout(enemyTurn, 1000);
                        }
                        return next;
                    });
                } else {
                    setMsg("¡Casi! Inténtalo de nuevo");
                    speak("¡Esa no es!");
                    setShaking(true);
                    setTimeout(() => setShaking(false), 300);
                    setTurn('ENEMY');
                    setTimeout(enemyTurn, 1200);
                }
            };

            const enemyTurn = () => {
                const enemyMsg = level.theme.msgs[Math.floor(Math.random() * level.theme.msgs.length)];
                setMsg(`${enemyEmoji}: "${enemyMsg}"`);
                speak(enemyMsg);
                
                setTimeout(() => {
                    const baseDmg = wave === level.waves ? level.enemyAtk * 1.5 : level.enemyAtk;
                    const dmg = Math.max(5, Math.floor(baseDmg - stats.def));
                    setFloating({ type: 'player', val: dmg });
                    setShaking(true);
                    setPhp(prev => {
                        const next = Math.max(0, prev - dmg);
                        if (next === 0) {
                            setMsg("¡Oh no! Has caído...");
                            speak("¡Vuelve a intentarlo, tú puedes!");
                            setTimeout(onLose, 2000);
                        } else {
                            setTurn('PLAYER');
                            setChallenge(null);
                        }
                        return next;
                    });
                    setTimeout(() => setShaking(false), 300);
                }, 1500);
            };

            return (
                <div className={`flex-1 flex flex-col ${level.theme.bg} overflow-hidden transition-colors duration-500`}>
                    
                    {/* ZONA DE BATALLA */}
                    <div className={`flex-1 flex flex-col items-center justify-around p-6 relative ${shaking ? 'animate-shake' : ''}`}>
                        
                        {/* Status bar superior del combate */}
                        <div className="absolute top-20 w-full px-8 flex justify-between items-center opacity-80">
                            <span className="title-font text-white text-xl drop-shadow-md">OLA {wave}/{level.waves}</span>
                            <span className="title-font text-white text-xl drop-shadow-md">{level.name}</span>
                        </div>

                        <div className="w-full flex justify-between items-end relative mt-10">
                            {/* Player side */}
                            <div className="flex flex-col items-center gap-3">
                                <div className="text-8xl relative animate-float drop-shadow-2xl">
                                    {player.avatar}
                                    {floating?.type === 'player' && <div className="floating-damage">-{floating.val}</div>}
                                </div>
                                <div className="w-28 h-5 bg-slate-900 rounded-full border-2 border-white shadow-lg overflow-hidden">
                                    <div className="h-full bg-green-500 transition-all duration-500" style={{width: `${php}%`}}></div>
                                </div>
                                <div className="text-white title-font text-xs uppercase tracking-tighter">HP: {php}</div>
                            </div>

                            {/* Enemy side */}
                            <div className="flex flex-col items-center gap-3">
                                <div className="text-8xl relative animate-float drop-shadow-2xl" style={{animationDelay: '1.5s'}}>
                                    {enemyEmoji}
                                    {floating?.type === 'enemy' && <div className="floating-damage">-{floating.val}</div>}
                                </div>
                                <div className="w-28 h-5 bg-slate-900 rounded-full border-2 border-white shadow-lg overflow-hidden">
                                    <div className="h-full bg-red-500 transition-all duration-500" style={{width: `${(ehp/level.enemyHp)*100}%`}}></div>
                                </div>
                                <div className="text-white title-font text-xs uppercase tracking-tighter">HP: {ehp}</div>
                            </div>
                        </div>
                        
                        {/* Burbuja de mensaje */}
                        <div className="bg-white/95 text-slate-900 px-8 py-3 rounded-[30px] title-font text-lg shadow-2xl border-4 border-slate-800 text-center mx-4 min-h-[60px] flex items-center">
                            {msg}
                        </div>
                    </div>

                    {/* PANEL TÁCTIL DE INTERACCIÓN */}
                    <div className="bg-slate-900 p-8 rounded-t-[50px] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t-[10px] border-slate-800 min-h-[42%] flex flex-col items-center justify-center">
                        {turn === 'PLAYER' && challenge ? (
                            <>
                                <div className="flex flex-col items-center mb-6">
                                    <p className="text-blue-400 font-black text-lg uppercase tracking-widest mb-1">Tu reto es:</p>
                                    <h3 className="text-white title-font text-5xl tracking-widest drop-shadow-lg">{challenge.word}</h3>
                                </div>
                                <div className="flex gap-5 w-full justify-center">
                                    {challenge.options.map((opt, i) => (
                                        <button 
                                            key={i} 
                                            onClick={() => handleAttack(opt)}
                                            className="text-7xl bg-slate-800 p-5 rounded-[35px] border-b-8 border-slate-950 active:translate-y-2 active:border-b-0 transition-all shadow-xl hover:bg-slate-700"
                                        >
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="animate-pulse flex flex-col items-center">
                                <div className="w-20 h-20 border-8 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
                                <p className="mt-4 title-font text-white text-xl">ESPERA...</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Súper RPG de Lectura - Edición Definitiva</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --app-height: 100%; }
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            background-color: #020617; font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent; user-select: none;
            touch-action: manipulation;
        }
        #root { height: 100%; width: 100%; }
        .title-font { font-family: 'Fredoka One', cursive; }

        /* Custom Scrollbar for Map and Shop */
        .custom-scroll { overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-12px) rotate(-5deg); } 75% { transform: translateX(12px) rotate(5deg); } }
        .animate-shake { animation: shake 0.4s; }

        @keyframes attack { 0% { transform: scale(1) translateY(0); } 50% { transform: scale(1.3) translateY(-30px); } 100% { transform: scale(1) translateY(0); } }
        .animate-attack { animation: attack 0.5s ease-out; }

        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px #fbbf24, inset 0 0 10px #fbbf24; } 50% { box-shadow: 0 0 30px #f59e0b, inset 0 0 20px #f59e0b; } }
        .current-level { animation: pulse-glow 2s infinite; }

        .bg-overlay { background: linear-gradient(to bottom, rgba(15, 23, 42, 0.4), rgba(2, 6, 23, 0.9)); }

        .floating-damage {
            position: absolute; font-weight: 900; font-size: 3.5rem;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            animation: damageText 1s forwards; pointer-events: none; z-index: 100;
        }
        @keyframes damageText { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.5); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- SISTEMA DE VOZ (AJUSTADO PARA EVITAR TRAMPA) ---
        const speak = (text, isClue = false) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                // Si no es una pista directa (como el modo listen), censuramos la palabra para que lean
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'es-ES'; msg.rate = 0.9; msg.pitch = 1.1;
                window.speechSynthesis.speak(msg);
            }
        };

        // --- BASE DE DATOS DE BIOMAS Y DICCIONARIOS ---
        const BIOMES = [
            {
                id: 0, name: "Pradera Feliz", 
                img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=800&q=80",
                enemies: ["🐛", "🐌", "🐝", "🐜"], bosses: ["🐢", "🐗", "🐍", "🦏"],
                words: [
                    {w: "SOL", m: "☀️"}, {w: "FLOR", m: "🌸"}, {w: "HOJA", m: "🍃"}, {w: "RANA", m: "🐸"},
                    {w: "PATO", m: "🦆"}, {w: "AGUA", m: "💧"}, {w: "NUBE", m: "☁️"}, {w: "CIELO", m: "🌤️"},
                    {w: "ARBOL", m: "🌳"}, {w: "PASTO", m: "🌱"}
                ]
            },
            {
                id: 1, name: "Bosque Oscuro", 
                img: "https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=800&q=80",
                enemies: ["🕷️", "🦇", "🐗", "🦉"], bosses: ["🐺", "🐻", "🧌", "🧟"],
                words: [
                    {w: "PINO", m: "🌲"}, {w: "OSO", m: "🐻"}, {w: "LUNA", m: "🌙"}, {w: "HONGO", m: "🍄"},
                    {w: "RAMA", m: "🪵"}, {w: "LOBO", m: "🐺"}, {w: "NOCHE", m: "🌃"}, {w: "BUHO", m: "🦉"},
                    {w: "ROCA", m: "🪨"}, {w: "CUEVA", m: "🕳️"}
                ]
            },
            {
                id: 2, name: "Playa Soleada", 
                img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80",
                enemies: ["🦀", "🐠", "🐡", "🦐"], bosses: ["🐙", "🦈", "🐋", "🦑"],
                words: [
                    {w: "MAR", m: "🌊"}, {w: "PEZ", m: "🐟"}, {w: "BARCO", m: "⛵"}, {w: "ISLA", m: "🏝️"},
                    {w: "COCO", m: "🥥"}, {w: "ARENA", m: "🏖️"}, {w: "CONCHA", m: "🐚"}, {w: "PALMA", m: "🌴"},
                    {w: "PULPO", m: "🐙"}, {w: "SOL", m: "☀️"}
                ]
            },
            {
                id: 3, name: "Montaña Helada", 
                img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80",
                enemies: ["⛄", "🐧", "🧊", "🐐"], bosses: ["🐻‍❄️", "🧌", "🦅", "🐺"],
                words: [
                    {w: "NIEVE", m: "❄️"}, {w: "HIELO", m: "🧊"}, {w: "FRIO", m: "🥶"}, {w: "GORRO", m: "🧶"},
                    {w: "TRINEO", m: "🛷"}, {w: "BLANCO", m: "⛄"}, {w: "PINO", m: "🌲"}, {w: "MONTE", m: "🏔️"},
                    {w: "FOCA", m: "🦭"}, {w: "OSO", m: "🐻‍❄️"}
                ]
            },
            {
                id: 4, name: "Desierto Seco", 
                img: "https://images.unsplash.com/photo-1473580044384-7ba9967e16a0?auto=format&fit=crop&w=800&q=80",
                enemies: ["🦂", "🐍", "🌵", "🦎"], bosses: ["🐪", "🦅", "🦂", "🐍"],
                words: [
                    {w: "SECO", m: "🏜️"}, {w: "CALOR", m: "🥵"}, {w: "ARENA", m: "🐪"}, {w: "OASIS", m: "🏝️"},
                    {w: "SOL", m: "☀️"}, {w: "HUESO", m: "🦴"}, {w: "ORO", m: "🪙"}, {w: "MAPA", m: "🗺️"},
                    {w: "COFRE", m: "🧰"}, {w: "JOYA", m: "💎"}
                ]
            },
            {
                id: 5, name: "Volcán Ardiente", 
                img: "https://images.unsplash.com/photo-1467348733814-3919a263f77d?auto=format&fit=crop&w=800&q=80",
                enemies: ["🔥", "👺", "☄️", "🌋"], bosses: ["🐉", "Rex", "🌋", "👺"],
                words: [
                    {w: "FUEGO", m: "🔥"}, {w: "LAVA", m: "🌋"}, {w: "HUMO", m: "💨"}, {w: "ROJO", m: "🔴"},
                    {w: "PIEDRA", m: "🪨"}, {w: "CENIZA", m: "🌫️"}, {w: "DRAGON", m: "🐉"}, {w: "MAGMA", m: "🔥"},
                    {w: "QUEMA", m: "🔥"}, {w: "CALOR", m: "🥵"}
                ]
            }
        ];

        // Todos las palabras posibles para generar distractores si un bioma tiene pocas
        const ALL_WORDS = BIOMES.flatMap(b => b.words);

        // --- TIENDA ---
        const SHOP_ITEMS = [
            { id: 'w1', type: 'weapon', name: "Palo de Madera", emoji: "🪵", stat: 15, cost: 30, desc: "+15 Daño" },
            { id: 'w2', type: 'weapon', name: "Espada de Juguete", emoji: "🗡️", stat: 30, cost: 80, desc: "+30 Daño" },
            { id: 'w3', type: 'weapon', name: "Hacha de Piedra", emoji: "🪓", stat: 60, cost: 200, desc: "+60 Daño" },
            { id: 'w4', type: 'weapon', name: "Lanza Larga", emoji: "🦯", stat: 100, cost: 450, desc: "+100 Daño" },
            { id: 'w5', type: 'weapon', name: "Martillo Gigante", emoji: "🔨", stat: 150, cost: 900, desc: "+150 Daño" },
            { id: 'w6', type: 'weapon', name: "Espada de Fuego", emoji: "🔥🗡️", stat: 250, cost: 1800, desc: "+250 Daño" },
            { id: 'a1', type: 'armor', name: "Camiseta Fuerte", emoji: "👕", stat: 5, cost: 30, desc: "+5 Defensa" },
            { id: 'a2', type: 'armor', name: "Casco de Bici", emoji: "🪖", stat: 15, cost: 100, desc: "+15 Defensa" },
            { id: 'a3', type: 'armor', name: "Escudo de Madera", emoji: "🛡️", stat: 30, cost: 250, desc: "+30 Defensa" },
            { id: 'a4', type: 'armor', name: "Pechera de Cuero", emoji: "🦺", stat: 60, cost: 600, desc: "+60 Defensa" },
            { id: 'c1', type: 'companion', name: "Perrito Fiel", emoji: "🐶", stat: 10, cost: 150, desc: "Cura 10 HP/Turno" },
            { id: 'c2', type: 'companion', name: "Gatito Suave", emoji: "🐱", stat: 25, cost: 400, desc: "Cura 25 HP/Turno" },
            { id: 'c3', type: 'companion', name: "Tortuga Sabia", emoji: "🐢", stat: 60, cost: 1000, desc: "Cura 60 HP/Turno" }
        ];

        const LEVELS = Array.from({ length: 30 }, (_, i) => {
            const levelId = i + 1;
            const biomeIndex = Math.min(Math.floor((levelId - 1) / 5), BIOMES.length - 1);
            const biome = BIOMES[biomeIndex];
            const waves = Math.floor((levelId - 1) / 10) + 3; 
            const starReward = levelId * 20 + Math.floor(Math.pow(levelId, 1.6) * 5); 

            return {
                id: levelId,
                name: `${biome.name} - Nivel ${levelId}`,
                biome: biome,
                totalWaves: waves,
                enemyHpBase: 25 + (levelId * 22),
                enemyAtkBase: 8 + (levelId * 6),
                reward: starReward
            };
        });

        function App() {
            const [screen, setScreen] = useState('TITLE');
            const [stars, setStars] = useState(0);
            const [maxLevel, setMaxLevel] = useState(1);
            const [currentLvl, setCurrentLvl] = useState(null);
            const [player, setPlayer] = useState({
                avatar: '👦',
                inv: { weapon: null, armor: null, companion: null },
                purchased: []
            });

            const playerMaxHp = 100 + (maxLevel * 35);
            const stats = useMemo(() => {
                let atk = 20 + (maxLevel * 6);
                let def = 0;
                let heal = 0;
                if (player.inv.weapon) atk += SHOP_ITEMS.find(i => i.id === player.inv.weapon).stat;
                if (player.inv.armor) def += SHOP_ITEMS.find(i => i.id === player.inv.armor).stat;
                if (player.inv.companion) heal += SHOP_ITEMS.find(i => i.id === player.inv.companion).stat;
                return { atk, def, heal };
            }, [player.inv, maxLevel]);

            return (
                <div className="w-full h-full relative">
                    {screen === 'TITLE' && <TitleScreen onStart={() => setScreen('MAP')} setPlayer={setPlayer} player={player} />}
                    {screen === 'MAP' && <MapScreen maxLevel={maxLevel} onSelect={(lvl) => { setCurrentLvl(lvl); setScreen('COMBAT'); }} stars={stars} onShop={() => setScreen('SHOP')} />}
                    {screen === 'SHOP' && <ShopScreen stars={stars} setStars={setStars} player={player} setPlayer={setPlayer} onBack={() => setScreen('MAP')} />}
                    {screen === 'COMBAT' && (
                        <CombatScreen 
                            level={currentLvl} 
                            playerAvatar={player.avatar}
                            playerMaxHp={playerMaxHp}
                            stats={stats}
                            onWin={() => {
                                if (currentLvl.id === maxLevel && maxLevel < 30) setMaxLevel(m => m + 1);
                                setStars(s => s + currentLvl.reward);
                                setScreen('MAP');
                            }}
                            onLose={() => setScreen('MAP')}
                        />
                    )}
                </div>
            );
        }

        function TitleScreen({ onStart, setPlayer, player }) {
            const avatars = ['👦', '👧', '🦁', '🦖', '🤖', '👸'];
            const handleStart = () => {
                const dummy = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(dummy);
                speak("¡Hola! Vamos a jugar");
                onStart();
            };
            return (
                <div className="w-full h-full flex flex-col items-center justify-center bg-indigo-900 p-6 text-center bg-[url('https://images.unsplash.com/photo-1534796636912-36528502f5d5?auto=format&fit=crop&w=800&q=80')] bg-cover bg-center relative">
                    <div className="absolute inset-0 bg-black/60"></div>
                    <div className="relative z-10 flex flex-col items-center">
                        <h1 className="title-font text-6xl text-yellow-400 mb-2 drop-shadow-xl">SÚPER RPG</h1>
                        <h2 className="title-font text-4xl text-white mb-10 drop-shadow-lg">DE LECTURA</h2>
                        <div className="bg-white/10 p-6 rounded-3xl backdrop-blur-md mb-10 border-2 border-white/20">
                            <p className="title-font text-2xl text-yellow-200 mb-6">ELIGE TU HÉROE</p>
                            <div className="grid grid-cols-3 gap-4">
                                {avatars.map(a => (
                                    <button key={a} onClick={() => { setPlayer({...player, avatar: a}); speak("¡Me gusta!"); }}
                                        className={`text-6xl p-4 rounded-2xl transition-all ${player.avatar === a ? 'bg-yellow-400 scale-110 shadow-xl' : 'bg-black/40 hover:bg-white/10'}`}
                                    >{a}</button>
                                ))}
                            </div>
                        </div>
                        <button onClick={handleStart} className="bg-green-500 text-white title-font text-4xl px-12 py-5 rounded-full border-b-8 border-green-700 active:border-b-0 active:translate-y-2 shadow-2xl">
                            ¡EMPEZAR!
                        </button>
                    </div>
                </div>
            );
        }

        function MapScreen({ maxLevel, onSelect, stars, onShop }) {
            const mapRef = useRef(null);
            useEffect(() => {
                const activeLvl = document.getElementById(`lvl-${maxLevel}`);
                if (activeLvl && mapRef.current) activeLvl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, [maxLevel]);
            return (
                <div className="w-full h-full bg-slate-900 custom-scroll relative" ref={mapRef}>
                    <div className="fixed top-0 left-0 w-full z-40 p-4 flex justify-between items-center bg-slate-900/80 backdrop-blur-md border-b-4 border-slate-700">
                        <div className="flex items-center gap-2 bg-yellow-400 border-4 border-yellow-600 px-5 py-2 rounded-full text-black title-font text-xl shadow-lg">
                            <span>⭐</span><span>{stars.toLocaleString()}</span>
                        </div>
                        <button onClick={onShop} className="bg-purple-600 text-white border-b-4 border-purple-800 px-6 py-2 rounded-full title-font text-xl active:translate-y-1 shadow-lg">🛒 TIENDA</button>
                    </div>
                    <div className="flex flex-col-reverse items-center pt-32 pb-48 gap-8 relative">
                        {LEVELS.map((lvl, idx) => {
                            const isLocked = lvl.id > maxLevel;
                            const isCurrent = lvl.id === maxLevel;
                            const isBoss = lvl.id % 5 === 0;
                            return (
                                <div key={lvl.id} id={`lvl-${lvl.id}`} className={`relative flex flex-col items-center ${(idx % 2 === 0) ? 'translate-x-12' : '-translate-x-12'}`}>
                                    <button disabled={isLocked} onClick={() => onSelect(lvl)}
                                        className={`w-24 h-24 rounded-3xl border-8 flex flex-col items-center justify-center transition-all z-10
                                            ${isLocked ? 'bg-slate-800 border-slate-700 text-slate-600 opacity-60' : isBoss ? 'bg-red-500 border-red-700 text-white shadow-[0_0_20px_red]' : 'bg-blue-500 border-blue-400 text-white shadow-xl'}
                                            ${isCurrent ? 'current-level scale-110' : 'active:scale-95'}`}>
                                        <span className="title-font text-4xl">{isLocked ? '🔒' : lvl.id}</span>
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function ShopScreen({ stars, setStars, player, setPlayer, onBack }) {
            const [filter, setFilter] = useState('weapon');
            const handleBuy = (item) => {
                if (player.purchased.includes(item.id)) {
                    setPlayer(p => ({ ...p, inv: { ...p.inv, [item.type]: item.id } }));
                    speak("¡Equipado!");
                } else if (stars >= item.cost) {
                    setStars(s => s - item.cost);
                    setPlayer(p => ({ ...p, purchased: [...p.purchased, item.id], inv: { ...p.inv, [item.type]: item.id } }));
                    speak("¡Gracias!");
                }
            };
            return (
                <div className="w-full h-full bg-slate-900 flex flex-col">
                    <div className="p-4 flex justify-between items-center bg-slate-800 border-b-4 border-slate-700">
                        <div className="bg-yellow-400 border-4 border-yellow-600 px-4 py-1 rounded-full text-black title-font text-xl">⭐ {stars.toLocaleString()}</div>
                        <button onClick={onBack} className="bg-red-500 text-white px-6 py-2 rounded-full title-font">VOLVER</button>
                    </div>
                    <div className="flex gap-2 p-4 justify-center">
                        {['weapon', 'armor', 'companion'].map(f => (
                            <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded-xl title-font ${filter===f?'bg-blue-500 text-white':'bg-slate-700 text-slate-400'}`}>
                                {f==='weapon'?'⚔️':f==='armor'?'🛡️':'🐶'}
                            </button>
                        ))}
                    </div>
                    <div className="flex-1 custom-scroll p-4 grid grid-cols-2 gap-4 pb-10">
                        {SHOP_ITEMS.filter(i => i.type === filter).map(item => {
                            const owned = player.purchased.includes(item.id);
                            const equipped = player.inv[item.type] === item.id;
                            return (
                                <div key={item.id} className={`bg-slate-800 border-4 rounded-3xl p-4 flex flex-col items-center text-center ${equipped ? 'border-green-400' : 'border-slate-600'}`}>
                                    <span className="text-5xl mb-2">{item.emoji}</span>
                                    <h4 className="title-font text-white text-xs">{item.name}</h4>
                                    <button onClick={() => handleBuy(item)} className={`w-full mt-3 py-2 rounded-xl title-font text-sm ${equipped ? 'bg-green-600' : owned ? 'bg-blue-600' : 'bg-yellow-500 text-black'}`}>
                                        {equipped ? 'PUESTO' : owned ? 'USAR' : `${item.cost}`}
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function CombatScreen({ level, playerAvatar, playerMaxHp, stats, onWin, onLose }) {
            const [wave, setWave] = useState(1);
            const [php, setPhp] = useState(playerMaxHp);
            const [enemies, setEnemies] = useState(null);
            const [challenge, setChallenge] = useState(null);
            const [msg, setMsg] = useState("¡Prepárate!");
            const [turn, setTurn] = useState('INIT');
            const [dmgFlow, setDmgFlow] = useState(null);
            const [playerAnim, setPlayerAnim] = useState('animate-float');
            const [enemyAnim, setEnemyAnim] = useState('animate-float');

            // Generar oleada y enemigos
            useEffect(() => {
                const isBoss = wave === level.totalWaves;
                let hordeSize = isBoss ? 1 : (level.id > 10 ? (Math.random() > 0.6 ? 2 : 1) : 1);
                const pool = isBoss ? level.biome.bosses : level.biome.enemies;
                const newEnemies = Array.from({length: hordeSize}, () => pool[Math.floor(Math.random() * pool.length)]);
                const hp = level.enemyHpBase * (isBoss ? 2.5 : hordeSize);
                
                setEnemies({
                    emojis: newEnemies,
                    hp: hp,
                    maxHp: hp,
                    atk: level.enemyAtkBase * (isBoss ? 1.4 : 1),
                    name: isBoss ? "JEFE GIGANTE" : "Enemigo",
                    isBoss: isBoss
                });

                speak(isBoss ? "¡Cuidado! El jefe ha llegado." : "¡Un enemigo aparece!");
                setTimeout(() => setTurn('PLAYER'), 1000);
            }, [wave]);

            // Generar desafío (CORRECCIÓN DE BUG DE OPCIONES)
            useEffect(() => {
                if (turn === 'PLAYER' && enemies && enemies.hp > 0) {
                    const dict = level.biome.words;
                    const correctTarget = dict[Math.floor(Math.random() * dict.length)];
                    
                    // MECÁNICA ALEATORIA
                    const types = ['match', 'listen'];
                    if (level.id >= 3) types.push('missing');
                    if (level.id >= 6) types.push('spell');
                    const type = types[Math.floor(Math.random() * types.length)];

                    // --- RECOLECCIÓN SEGURA DE DISTRACTORES ---
                    // Buscamos palabras que NO sean la correcta en todo el diccionario global para que nunca falten
                    const distractors = ALL_WORDS
                        .filter(w => w.w !== correctTarget.w)
                        .sort(() => Math.random() - 0.5)
                        .slice(0, 2);

                    if (type === 'match' || type === 'listen') {
                        // Aseguramos que siempre tengamos 3 opciones (correcta + 2 distractores)
                        const options = [correctTarget.m, distractors.m, distractors.m]
                            .sort(() => Math.random() - 0.5);
                        
                        setChallenge({ type, word: correctTarget.w, correct: correctTarget.m, options });
                        
                        if (type === 'match') {
                            setMsg("Lee la palabra y elige la imagen");
                            speak("Busca la imagen correcta"); // No decimos la palabra
                        } else {
                            setMsg("Toca la bocina y elige la imagen");
                            // En listen sí permitimos que suene la palabra solo al tocar la bocina en el UI
                        }
                    } else if (type === 'missing') {
                        const word = correctTarget.w;
                        const idx = Math.floor(Math.random() * word.length);
                        const correctL = word[idx];
                        const alphabet = "ABCDEILMNOPRSTU".split('');
                        const options = [correctL, ...alphabet.filter(l => l !== correctL).sort(()=>0.5-Math.random()).slice(0,2)].sort(()=>0.5-Math.random());
                        
                        setChallenge({ type, word, blankIdx: idx, correctL, options });
                        setMsg("¿Qué letra falta en el hueco?");
                        speak("Busca la letra que falta");
                    } else {
                        const letters = correctTarget.w.split('').sort(() => Math.random() - 0.5);
                        setChallenge({ type, word: correctTarget.w, letters, selected: [] });
                        setMsg("Ordena las letras para formar la palabra");
                        speak("¡Ordena las letras!");
                    }
                }
            }, [turn, wave]);

            const handleAttack = (success) => {
                if (success) {
                    setTurn('ANIM');
                    setMsg("¡ATAQUE GENIAL!");
                    speak("¡Increíble!");
                    setPlayerAnim('animate-attack');
                    setTimeout(() => {
                        const dmg = Math.floor(stats.atk * (0.9 + Math.random() * 0.2));
                        setDmgFlow({ side: 'enemy', val: dmg });
                        setEnemyAnim('animate-shake');
                        setEnemies(prev => {
                            const nhp = Math.max(0, prev.hp - dmg);
                            if (nhp === 0) {
                                if (wave < level.totalWaves) {
                                    setTimeout(() => setWave(w => w + 1), 1500);
                                } else {
                                    setTurn('END');
                                    speak("¡Has ganado!");
                                    setTimeout(onWin, 2500);
                                }
                            } else {
                                setTimeout(enemyTurn, 1000);
                            }
                            return {...prev, hp: nhp};
                        });
                    }, 500);
                } else {
                    setMsg("¡Casi! Inténtalo de nuevo");
                    speak("¡Cuidado!");
                    setTurn('ANIM');
                    setTimeout(enemyTurn, 1000);
                }
            };

            const enemyTurn = () => {
                setTurn('ENEMY');
                setEnemyAnim('animate-attack');
                setTimeout(() => {
                    const dmg = Math.max(5, Math.floor(enemies.atk - stats.def));
                    setDmgFlow({ side: 'player', val: dmg });
                    setPlayerAnim('animate-shake');
                    setPhp(prev => {
                        const nhp = Math.max(0, prev - dmg);
                        if (nhp === 0) {
                            setTurn('END');
                            speak("Oh no, vuelve a intentarlo.");
                            setTimeout(onLose, 2500);
                        } else {
                            if (stats.heal > 0) {
                                setTimeout(() => {
                                    setDmgFlow({ side: 'heal', val: stats.heal });
                                    setPhp(p => Math.min(playerMaxHp, p + stats.heal));
                                }, 800);
                            }
                            setTimeout(() => setTurn('PLAYER'), 1500);
                        }
                        return nhp;
                    });
                }, 500);
            };

            if (!enemies) return null;

            return (
                <div className="w-full h-full flex flex-col relative overflow-hidden">
                    <img src={level.biome.img} className="absolute inset-0 w-full h-full object-cover z-0" />
                    <div className="absolute inset-0 bg-overlay z-10"></div>

                    <div className="relative z-20 flex-1 p-6 flex flex-col justify-between items-center">
                        <div className="w-full flex justify-between items-center bg-black/50 p-4 rounded-3xl border-2 border-white/20 backdrop-blur-sm">
                            <span className="title-font text-white">{level.name}</span>
                            <span className="title-font text-yellow-400 bg-red-600 px-4 rounded-full">OLA {wave}/{level.totalWaves}</span>
                        </div>

                        <div className="w-full flex justify-between items-end">
                            <div className={`flex flex-col items-center ${playerAnim}`}>
                                {dmgFlow?.side==='player'&&<div className="floating-damage text-red-500">-{dmgFlow.val}</div>}
                                {dmgFlow?.side==='heal'&&<div className="floating-damage text-green-400">+{dmgFlow.val}</div>}
                                <span className="text-8xl sm:text-9xl drop-shadow-2xl">{playerAvatar}</span>
                                <div className="w-32 h-6 bg-slate-900 rounded-full border-4 border-white mt-4 relative overflow-hidden">
                                    <div className="h-full bg-green-500 transition-all" style={{width:`${(php/playerMaxHp)*100}%`}}></div>
                                </div>
                            </div>

                            <div className={`flex flex-col items-center ${enemyAnim}`}>
                                {dmgFlow?.side==='enemy'&&<div className="floating-damage text-white">-{dmgFlow.val}</div>}
                                <div className="flex flex-wrap-reverse justify-center gap-1">
                                    {enemies.emojis.map((em, i) => (
                                        <span key={i} className={`text-8xl sm:text-9xl drop-shadow-2xl ${enemies.isBoss ? 'scale-150' : ''}`}>{em}</span>
                                    ))}
                                </div>
                                <div className="w-32 h-6 bg-slate-900 rounded-full border-4 border-white mt-4 relative overflow-hidden">
                                    <div className="h-full bg-red-500 transition-all" style={{width:`${(enemies.hp/enemies.maxHp)*100}%`}}></div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-3xl border-4 border-slate-800 title-font text-xl text-center w-full shadow-2xl text-slate-800">
                            {msg}
                        </div>
                    </div>

                    <div className="h-[42%] bg-slate-900/95 border-t-8 border-slate-800 p-6 flex flex-col items-center justify-center z-30 rounded-t-[40px]">
                        {turn === 'PLAYER' && challenge ? (
                            <div className="w-full flex flex-col items-center">
                                {challenge.type === 'match' && (
                                    <>
                                        <h2 className="text-white title-font text-5xl mb-8 tracking-widest uppercase">{challenge.word}</h2>
                                        <div className="flex gap-6">
                                            {challenge.options.map((opt, i) => (
                                                <button key={i} onClick={() => handleAttack(opt === challenge.correct)} 
                                                    className="text-7xl bg-slate-800 p-6 rounded-3xl border-b-8 border-black active:translate-y-2 active:border-b-0 transition-all">
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                )}
                                {challenge.type === 'listen' && (
                                    <>
                                        <button onClick={() => speak(challenge.word)} className="text-6xl bg-blue-600 p-6 rounded-full mb-6 animate-pulse">🔊</button>
                                        <div className="flex gap-6">
                                            {challenge.options.map((opt, i) => (
                                                <button key={i} onClick={() => handleAttack(opt === challenge.correct)} 
                                                    className="text-7xl bg-slate-800 p-6 rounded-3xl border-b-8 border-black active:translate-y-2 active:border-b-0">
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                )}
                                {challenge.type === 'missing' && (
                                    <>
                                        <h2 className="text-white title-font text-5xl mb-8 tracking-widest uppercase">
                                            {challenge.word.split('').map((l, i) => i === challenge.blankIdx ? '_' : l).join('')}
                                        </h2>
                                        <div className="flex gap-6">
                                            {challenge.options.map((opt, i) => (
                                                <button key={i} onClick={() => handleAttack(opt === challenge.correctL)} 
                                                    className="text-6xl title-font bg-purple-600 text-white w-20 h-20 rounded-2xl border-b-8 border-purple-900">
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                )}
                                {challenge.type === 'spell' && (
                                    <div className="w-full flex flex-col items-center">
                                        <div className="flex gap-3 mb-6">
                                            {challenge.word.split('').map((_, i) => (
                                                <div key={i} className="w-12 h-14 border-b-4 border-yellow-400 text-4xl title-font text-white flex justify-center items-center">
                                                    {challenge.selected[i]?.l || ''}
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex flex-wrap justify-center gap-3">
                                            {challenge.letters.map((l, i) => {
                                                const used = challenge.selected.some(s => s.idx === i);
                                                return (
                                                    <button key={i} disabled={used} onClick={() => {
                                                        const next = challenge.word[challenge.selected.length];
                                                        if (l === next) {
                                                            const nSelected = [...challenge.selected, {l, idx: i}];
                                                            setChallenge({...challenge, selected: nSelected});
                                                            if (nSelected.length === challenge.word.length) setTimeout(() => handleAttack(true), 500);
                                                        } else {
                                                            handleAttack(false);
                                                        }
                                                    }} className={`w-14 h-14 rounded-xl text-3xl title-font transition-all ${used ? 'bg-slate-800 text-slate-700' : 'bg-blue-500 text-white shadow-lg'}`}>
                                                        {l}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="flex flex-col items-center gap-4">
                                <div className="w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
                                <span className="title-font text-white text-xl uppercase tracking-widest">Esperando...</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
</body>
</html>
